<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta name="description" content="Dinder - Find restaurants everyone agrees on" />

    <!-- Link unfurl (static on every route; intentionally no url tag, see docs/specs/tap-to-join-invite.md) -->
    <meta property="og:site_name" content="Dinder" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dinder — Swipe. Match. Eat." />

      property="og:description"
      content="Your group is picking dinner. Tap to join the session and start swiping."
    />
    <meta property="og:image" content="https://www.dinder.it.com/images/og-card.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:alt" content="A neon-lit night market food stall" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dinder — Swipe. Match. Eat." />
    <meta
      name="twitter:description"
      content="Your group is picking dinner. Tap to join the session and start swiping."
    />
    <meta name="twitter:image" content="https://www.dinder.it.com/images/og-card.jpg" />

    <meta name="theme-color" content="#030712" />

    <!-- Mobile optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/dinder-icon-192.png" />

    <title>Dinder</title>
