name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # write: the review is delivered as PR comments
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Tracking comment guarantees the review lands on the PR even if a
          # `gh pr comment` call fails.
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Then do a second pass hunting over-engineering only (ponytail review).
            The diff's best outcome is getting shorter. One line per finding:
            `<file>:L<line>: <tag> <what>. <replacement>.` using these tags:
            - `delete:` dead code, unused flexibility, speculative feature. Replacement: nothing.
            - `stdlib:` hand-rolled thing the standard library ships. Name the function.
            - `native:` dependency or code doing what the platform already does. Name the feature.
            - `yagni:` abstraction with one implementation, config nobody sets, layer with one caller.
            - `shrink:` same logic, fewer lines. Show the shorter form.
            End the pass with `net: -<N> lines possible.`, or `Lean already. Ship.` if
            there is nothing to cut. A single smoke test or assert-based self-check is
            the minimum, not bloat — never flag it for deletion. Post this pass as its
            own section titled "Ponytail pass" in the top-level review comment.

            Use the repository's CLAUDE.md for guidance on style and conventions.
            Be constructive and helpful in your feedback.

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/solutions.md
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh pr list:*),Bash(gh search:*)"
