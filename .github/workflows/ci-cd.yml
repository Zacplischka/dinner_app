name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  GOOGLE_PLACES_API_KEY: test-google-places-key
  APIFY_TOKEN: test-apify-token
  SUPABASE_URL: http://localhost:54321
  SUPABASE_SERVICE_ROLE_KEY: test-service-role
  VITE_SUPABASE_URL: http://localhost:54321
  VITE_SUPABASE_ANON_KEY: test-anon-key

permissions:
  contents: read
  statuses: read

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Root typecheck builds @dinder/shared first (its build is also its type
      # check), which frontend's type-aware lint below also depends on.
      - name: Type check
        run: npm run typecheck

      - name: Lint backend
        run: npm run lint --workspace=@dinder/backend

      - name: Lint frontend
        run: npm run lint --workspace=@dinder/frontend

      - name: Run backend unit tests
        run: npm run test:unit --workspace=@dinder/backend

      - name: Run frontend unit tests
        run: npm run test:unit --workspace=@dinder/frontend

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=@dinder/shared

      - name: Run contract tests
        run: npm run test:contract --workspace=@dinder/backend
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  verify-production-deploy:
    name: Verify Production Deploy
    runs-on: ubuntu-latest
    needs: [lint, contract-tests]
    # workflow_dispatch lets an operator deliberately rerun the whole job after a
    # proxy-state transition; no manual purge is ever required.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: Dinner-App / production
      url: https://www.dinder.it.com
    env:
      # Explicit, non-secret rollout state. Accepted values:
      #   bootstrap  - no frontend host is proxied (default when the variable is unset)
      #   apex-only  - dinder.it.com is proxied, www.dinder.it.com is still DNS-only
      #   both-hosts - both frontend hosts are proxied
      # The job never infers this from the presence or absence of a Cloudflare header;
      # scripts/check-production-edge.mjs asserts the declared state against reality.
      DINDER_EDGE_ROLLOUT_STATE: ${{ vars.DINDER_EDGE_ROLLOUT_STATE || 'bootstrap' }}
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Wait for Railway deployments
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          required_contexts=("Dinner-App - backend" "Dinner-App - frontend")

          for attempt in {1..60}; do
            status_json="$(gh api "repos/${REPOSITORY}/commits/${COMMIT_SHA}/status")"
            all_success=true

            for context in "${required_contexts[@]}"; do
              state="$(node -e 'const status = JSON.parse(process.argv[1]).statuses.find((item) => item.context === process.argv[2]); console.log(status?.state ?? "missing");' "$status_json" "$context")"
              echo "${context}: ${state}"

              if [[ "$state" == "failure" || "$state" == "error" ]]; then
                exit 1
              fi

              if [[ "$state" != "success" ]]; then
                all_success=false
              fi
            done

            if [[ "$all_success" == "true" ]]; then
              exit 0
            fi

            sleep 10
          done

          exit 1

      - name: Verify backend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error https://backend-production-4ce9.up.railway.app/health; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Verify frontend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --location https://www.dinder.it.com >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      # Runs before the purge so the tag purge is proved to reset a warm document
      # while the warm fingerprinted asset survives it.
      - name: Warm per-commit document and fingerprinted asset
        if: env.DINDER_EDGE_ROLLOUT_STATE != 'bootstrap'
        run: node scripts/check-production-edge.mjs prewarm

      # Only runs after both Railway deployment statuses succeeded for this SHA.
      # Failure fails production verification; the retry is GitHub "Re-run failed
      # jobs", which repeats this idempotent purge. A dashboard purge is recorded
      # break-glass recovery only.
      - name: Purge route HTML cache tag
        if: env.DINDER_EDGE_ROLLOUT_STATE != 'bootstrap'
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ZONE_ID" || -z "$CLOUDFLARE_CACHE_PURGE_TOKEN" ]]; then
            echo "CLOUDFLARE_ZONE_ID variable or CLOUDFLARE_CACHE_PURGE_TOKEN secret is missing" >&2
            exit 1
          fi

          # 000 records a transport error; the token is never written to the log.
          : >"$RUNNER_TEMP/purge.json"
          status="$(curl --silent --show-error \
            --request POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            --header "Authorization: Bearer ${CLOUDFLARE_CACHE_PURGE_TOKEN}" \
            --header 'Content-Type: application/json' \
            --data '{"tags":["dinder-route-html"]}' \
            --output "$RUNNER_TEMP/purge.json" \
            --write-out '%{http_code}')" || status=000

          node scripts/check-production-edge.mjs purge-response "$status" "$RUNNER_TEMP/purge.json"

      # Portable cache and health semantics only. The fixed-Melbourne performance
      # gate is never evaluated or reported as passed here.
      - name: Verify frontend cache and route contracts
        run: node scripts/check-production-edge.mjs verify

      - name: Smoke test session create (Places API key)
        run: bash scripts/smoke-prod.sh
