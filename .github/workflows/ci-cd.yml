name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  GOOGLE_PLACES_API_KEY: test-google-places-key
  APIFY_TOKEN: test-apify-token
  SUPABASE_URL: http://localhost:54321
  SUPABASE_SERVICE_ROLE_KEY: test-service-role
  SUPABASE_JWT_SECRET: test-jwt-secret
  VITE_SUPABASE_URL: http://localhost:54321
  VITE_SUPABASE_ANON_KEY: test-anon-key

permissions:
  contents: read
  statuses: read

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=@dinder/backend

      - name: Lint frontend
        run: npm run lint --workspace=@dinder/frontend

      - name: Type check shared
        run: npm run build --workspace=@dinder/shared

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Type check frontend
        run: cd frontend && npx tsc --noEmit

      - name: Run backend unit tests
        run: npm run test:unit --workspace=@dinder/backend

      - name: Run frontend unit tests
        run: npm run test:unit --workspace=@dinder/frontend

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=@dinder/shared

      - name: Run contract tests
        run: npm run test:contract --workspace=@dinder/backend
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  e2e-tests:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build shared types
        run: npm run build --workspace=@dinder/shared

      - name: Build backend
        run: npm run build --workspace=@dinder/backend

      - name: Build frontend
        run: npm run build --workspace=@dinder/frontend
        env:
          VITE_API_BASE_URL: http://localhost:3001/api
          VITE_BACKEND_URL: http://localhost:3001

      - name: Start backend server
        run: npm run start --workspace=@dinder/backend &
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          PORT: 3001
          NODE_ENV: test
          FRONTEND_URL: http://localhost:3000

      - name: Start frontend server
        run: npm run preview --workspace=@dinder/frontend -- --port 3000 &

      - name: Wait for servers
        run: |
          npx --no-install wait-on http://localhost:3000 http://localhost:3001/health --timeout 60000

      - name: Run E2E smoke tests
        run: npm run test:e2e --workspace=@dinder/frontend -- --project=mobile-chrome home.spec.ts
        env:
          BASE_URL: http://localhost:3000
          BACKEND_URL: http://localhost:3001
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-screenshots
          path: frontend/test-results/
          retention-days: 7

  verify-production-deploy:
    name: Verify Production Deploy
    runs-on: ubuntu-latest
    needs: [lint, contract-tests, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: Dinner-App / production
      url: https://www.dinder.it.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Wait for Railway deployments
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          required_contexts=("Dinner-App - backend" "Dinner-App - frontend")

          for attempt in {1..60}; do
            status_json="$(gh api "repos/${REPOSITORY}/commits/${COMMIT_SHA}/status")"
            all_success=true

            for context in "${required_contexts[@]}"; do
              state="$(node -e 'const status = JSON.parse(process.argv[1]).statuses.find((item) => item.context === process.argv[2]); console.log(status?.state ?? "missing");' "$status_json" "$context")"
              echo "${context}: ${state}"

              if [[ "$state" == "failure" || "$state" == "error" ]]; then
                exit 1
              fi

              if [[ "$state" != "success" ]]; then
                all_success=false
              fi
            done

            if [[ "$all_success" == "true" ]]; then
              exit 0
            fi

            sleep 10
          done

          exit 1

      - name: Verify backend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error https://backend-production-4ce9.up.railway.app/health; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Verify frontend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --location https://www.dinder.it.com >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Smoke test session create (Places API key)
        run: bash scripts/smoke-prod.sh
